<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>RGB</h1>
    <div class="row">
      <div class="col-sm-1">
        <div class="red mt-1">
          <h5>R:</h5>
        </div>
        <div class="green mt-4">
          <h5>G:</h5>
        </div>
        <div class="green mt-4">
          <h5>B:</h5>
        </div>
      </div>
      <div class="col-sm-5">
        <div class="red mb-2">
          <input type="text" class="form-control" id="r">
        </div>
        <div class="green mb-2">
          <input type="text" class="form-control" id="g">
        </div>
        <div class="blue mb-2">
          <input type="text" class="form-control" id="b">
        </div>
      </div>
      <div class="col-sm-1">
        <div class="redcard mt-1"></div>
        <div class="greencard"></div>
        <div class="blackcard"></div>
      </div>
      <div class="col-sm-5">
        <div class="h1 ml-5">
          <h1>HEX</h1>
        </div>
        <div class="hex ml-5">
          <input type="text" class="form-control" id="hex">
        </div>
        <div class="hexcolor ml-5" style="background-color:#d9534f"></div>
      </div>
    </div>
    <button class="btn btn-primary mt-2" data-alpha-pos="convert">Convert</button>
  </div>
  <script src="index.js"></script>
</body>

</html>
